name: Update Leise cask

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Update to the latest Leise release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release="$(gh api repos/zoltanf/Leise/releases/latest)"
          tag="$(jq -r '.tag_name' <<<"$release")"
          version="${tag#v}"
          asset_name="Leise-${version}-macOS-arm64.dmg"
          digest="$(jq -r --arg name "$asset_name" '.assets[] | select(.name == $name) | .digest' <<<"$release")"
          sha256="${digest#sha256:}"

          test -n "$version"
          test "$digest" != "null"
          test ${#sha256} -eq 64

          VERSION="$version" SHA256="$sha256" ruby <<'RUBY'
          path = "Casks/leise.rb"
          contents = File.read(path)
          contents.sub!(/version "[^"]+"/, "version \"#{ENV.fetch("VERSION")}\"")
          contents.sub!(/sha256 "[a-f0-9]+"/, "sha256 \"#{ENV.fetch("SHA256")}\"")
          File.write(path, contents)
          RUBY

          if git diff --quiet; then
            echo "Cask is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/leise.rb
          git commit -m "Update Leise to ${version}"
          git push
